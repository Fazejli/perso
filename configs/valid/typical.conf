server {
    listen      8080;
    host        127.0.0.1;
    server_name example.com www.example.com;

    client_max_body_size 1048576;

    error_page 404 /errors/404.html;
    error_page 500 502 503 504 /errors/5xx.html;

    location / {
        root            ./www;
        index           index.html;
        allowed_methods GET;
    }

    location /static/ {
        root            ./www;
        autoindex       on;
        allowed_methods GET;
    }

    location /upload {
        root            ./www;
        upload_enabled  on;
        upload_store    ./uploads;
        allowed_methods POST DELETE;
        client_max_body_size 10485760;
    }

    location /errors/ {
        root            ./www;
        allowed_methods GET;
    }
}
